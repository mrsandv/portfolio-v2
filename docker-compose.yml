services:
  api:
    build:
      context: ./apps/api
    ports:
      - "8080:8080"
    env_file:
      - ./apps/api/.env
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      args:
        - API_URL=http://api:8080
    ports:
      - "3000:3000"
    env_file:
      - ./apps/web/.env
    environment:
      - API_URL=http://api:8080
    restart: unless-stopped
    depends_on:
      - api
