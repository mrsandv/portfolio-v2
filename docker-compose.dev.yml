services:
  seed:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
    env_file:
      - ./apps/api/.env
    environment:
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=admin123
    command: ["go", "run", "./cmd/seed/"]

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
    env_file:
      - ./apps/api/.env
    environment:
      - PORT=8080
      - ALLOWED_ORIGINS=http://localhost:3000,http://web:3000
    volumes:
      - ./apps/api:/app
    depends_on:
      seed:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    env_file:
      - ./apps/web/.env
    environment:
      - API_URL=http://api:8080
      - NEXT_PUBLIC_API_URL=http://api:8080
    volumes:
      - ./apps/web:/app
      - /app/.next
    depends_on:
      api:
        condition: service_healthy
