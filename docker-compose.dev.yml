services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
    env_file:
      - ./apps/api/.env
    environment:
      - MONGO_URI=mongodb://mongo:27017
      - MONGO_DB=portfolio
      - PORT=8080
    volumes:
      - ./apps/api:/app
    depends_on:
      mongo:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    env_file:
      - ./apps/web/.env
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8080
    volumes:
      - ./apps/web:/app
      - /app/.next
    depends_on:
      - api

volumes:
  mongo_data:
